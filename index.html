<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Google</title>
  <link rel="stylesheet" href="stle.css">
</head>
<body>
  <header>
    <div class="header-links">
      <a href="#">Gmail</a>
      <a href="#">Images</a>
      <button class="app-icon" aria-label="Google apps">
        <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M4 5h4V1H4v4zm6 0h4V1h-4v4zm6 0h4V1h-4v4zM4 11h4V7H4v4zm6 0h4V7h-4v4zm6 0h4V7h-4v4zM4 17h4v-4H4v4zm6 0h4v-4h-4v4zm6 0h4v-4h-4v4z"></path></svg>
      </button>
      <button class="sign-in" type="button">Sign in</button>
    </div>
  </header>

  <main>
    <div class="content">
      <div class="logo" aria-label="Google logo">
        <span class="blue">G</span>
        <span class="red">o</span>
        <span class="yellow">o</span>
        <span class="blue">g</span>
        <span class="green">l</span>
        <span class="red">e</span>
      </div>

      <form id="search-form" class="search-form" action="https://www.google.com/search" method="GET">
        <div class="search-box">
          <svg viewBox="0 0 24 24" focusable="false" aria-hidden="true"><path d="M15.5 14h-.79l-.28-.27A6.471 6.471 0 0016 9.5 6.5 6.5 0 109.5 16c1.61 0 3.09-.59 4.23-1.57l.27.28v.79l5 4.99L20.49 19l-4.99-5zM10 14a4 4 0 110-8 4 4 0 010 8z"></path></svg>
          <input type="search" name="q" aria-label="Search" placeholder="Search Google or type a URL">
        </div>
      </form>

      <div class="actions">
        <button type="submit" form="search-form">Google Search</button>
        <button type="button">I'm Feeling Lucky</button>
      </div>
    </div>
  </main>

  <footer>
    <div class="footer-left">
      <a href="#">Advertising</a>
      <a href="#">Business</a>
      <a href="#">How Search works</a>
    </div>
    <div class="footer-right">
      <a href="#">Privacy</a>
      <a href="#">Terms</a>
      <a href="#">Settings</a>
    </div>
  </footer>
</body>
</html>
